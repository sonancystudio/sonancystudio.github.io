  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <style>
    /* ─────────────────────────────────────────
       THEME VARIABLES  — edit these to restyle
    ───────────────────────────────────────── */
    :root {
      --bg:          #0d0d0d;
      --surface:     #161616;
      --card:        #1c1c1c;
      --border:      #2a2a2a;
      --text:        #e0e0e0;
      --text-muted:  #888;
      --accent:      #c9a96e;
      --accent-dim:  rgba(201,169,110,.15);
      --radius:      6px;
      --gap:         14px;
      --font:        'Georgia', serif;
      --font-ui:     system-ui, sans-serif;
    }

    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ─── HEADER ─── */
    header {
      text-align: center;
      padding: 56px 24px 0;
    }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: normal;
    }
    header p.subtitle {
      margin-top: 8px;
      font-size: .95rem;
      color: var(--text-muted);
      font-family: var(--font-ui);
      letter-spacing: .06em;
    }

    /* ─── TABS ─── */
    nav.tabs {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-top: 40px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    nav.tabs button {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 10px 28px;
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: .85rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color .2s, border-color .2s;
      margin-bottom: -1px;
    }
    nav.tabs button:hover { color: var(--text); }
    nav.tabs button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ─── MAIN CONTENT ─── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ─── TAB PANELS ─── */
    .tab-panel {
      display: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .3s ease, transform .3s ease;
    }
    .tab-panel.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── MASONRY GALLERY ─── */
    #gallery-grid {
      columns: 3 280px;
      column-gap: var(--gap);
    }
    .gallery-card {
      break-inside: avoid;
      position: relative;
      margin-bottom: var(--gap);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .gallery-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(201,169,110,.18);
    }
    /* The actual <img> is pointer-events: none so nothing touches it */
    .gallery-card img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
      -webkit-user-drag: none;
      user-drag: none;
      -webkit-touch-callout: none;
    }
    /* Transparent overlay sits above img, catches clicks, blocks right-click on img */
    .img-shield {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: transparent;
      cursor: pointer;
    }
    /* Caption bar */
    .gallery-card .caption {
      padding: 10px 12px;
      font-family: var(--font-ui);
      font-size: .78rem;
    }
    .gallery-card .caption .cap-title {
      color: var(--text);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .gallery-card .caption .cap-credit {
      color: var(--text-muted);
      font-size: .72rem;
      margin-top: 2px;
    }

    /* ─── LIGHTBOX ─── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,.92);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #lightbox.open { display: flex; }

    #lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 82vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #lightbox-img-wrap {
      position: relative;
      display: inline-block;
    }
    #lightbox-img {
      display: block;
      max-width: 90vw;
      max-height: 80vh;
      border-radius: var(--radius);
      pointer-events: none;
      -webkit-user-drag: none;
      user-drag: none;
    }
    /* Shield over lightbox image too */
    #lightbox-img-shield {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    #lightbox-meta {
      text-align: center;
      margin-top: 14px;
      font-family: var(--font-ui);
    }
    #lightbox-meta .lb-title {
      font-size: 1rem;
      color: var(--text);
    }
    #lightbox-meta .lb-credit {
      font-size: .8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    #lightbox-counter {
      font-size: .75rem;
      color: var(--text-muted);
      margin-top: 6px;
      font-family: var(--font-ui);
      letter-spacing: .06em;
    }

    /* Close button */
    #lb-close {
      position: fixed;
      top: 18px;
      right: 22px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 1.4rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .2s, border-color .2s;
      z-index: 1010;
    }
    #lb-close:hover { color: var(--accent); border-color: var(--accent); }

    /* Prev / Next */
    .lb-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,.5);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 1.5rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .2s, border-color .2s, background .2s;
      z-index: 1010;
    }
    .lb-arrow:hover { color: var(--accent); border-color: var(--accent); background: rgba(0,0,0,.8); }
    #lb-prev { left: 18px; }
    #lb-next { right: 18px; }

    /* ─── VIDEOS ─── */
    #video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
    }
    .video-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .video-embed-wrap {
      position: relative;
      padding-top: 56.25%; /* 16:9 */
      background: #000;
    }
    .video-embed-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .video-meta {
      padding: 14px 16px;
      font-family: var(--font-ui);
    }
    .video-meta h3 {
      font-size: .9rem;
      font-weight: 600;
      color: var(--text);
    }
    .video-meta p {
      margin-top: 6px;
      font-size: .8rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ─── ABOUT ─── */
    #about-inner {
      max-width: 720px;
      margin: 0 auto;
    }
    .about-section {
      margin-bottom: 40px;
    }
    .about-section h2 {
      font-size: 1rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: var(--font-ui);
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .about-section p {
      line-height: 1.8;
      color: var(--text-muted);
      font-size: .95rem;
    }
    .credits-list {
      list-style: none;
      display: grid;
      gap: 10px;
    }
    .credits-list li {
      display: flex;
      gap: 16px;
      font-family: var(--font-ui);
      font-size: .88rem;
    }
    .credits-list .role {
      color: var(--accent);
      min-width: 140px;
      flex-shrink: 0;
      font-weight: 600;
    }
    .credits-list .name { color: var(--text-muted); }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-family: var(--font-ui);
      font-size: .9rem;
    }

    /* ─── FOOTER ─── */
    footer {
      text-align: center;
      padding: 24px;
      font-family: var(--font-ui);
      font-size: .75rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      #gallery-grid { columns: 1; }
      #lb-prev { left: 6px; }
      #lb-next { right: 6px; }
      nav.tabs button { padding: 10px 16px; font-size: .78rem; }
    }
    @media (min-width: 601px) and (max-width: 900px) {
      #gallery-grid { columns: 2; }
    }
  </style>
</head>

<script>
/* ──────────────────────────────────────────────────────────
   CONFIGURATION
   Change the values below — do not touch anything below
   the "END OF CONFIG" comment unless you know what you're doing.
────────────────────────────────────────────────────────── */
const CONFIG = {

  // ── Page identity
  title:    "My Gallery",
  subtitle: "A curated collection",
  footer:   "© 2025 My Gallery. All rights reserved.",

  // ── About / Credits tab
  description: `Write a description of your work here. You can use multiple sentences.
This text appears in the About tab.`,

  credits: [
    { role: "Photography",   name: "Your Name" },
    { role: "Art Direction", name: "Collaborator Name" },
    { role: "Website",       name: "Built with love" }
  ],

  // ── Gallery images
  // Add as many objects as you like.
  // caption and credit are optional.
  images: [
    {
      url:     "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800",
      caption: "Mountain Sunrise",
      credit:  "© Photographer Name"
    },
    {
      url:     "https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800",
      caption: "Forest Light",
      credit:  "© Photographer Name"
    },
    {
      url:     "https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600",
      caption: "Valley View",
      credit:  "© Photographer Name"
    },
    {
      url:     "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800",
      caption: "Deep Forest",
      credit:  "© Photographer Name"
    },
    {
      url:     "https://images.unsplash.com/photo-1518623489648-a173ef7824f3?w=800",
      caption: "Misty Lake",
      credit:  "© Photographer Name"
    },
    {
      url:     "https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=600",
      caption: "Autumn Path",
      credit:  "© Photographer Name"
    }
  ],

  // ── YouTube videos
  // youtubeId is the part after "v=" in the URL, e.g. "dQw4w9WgXcQ"
  // title and description are optional.
  videos: [
    {
      youtubeId:   "dQw4w9WgXcQ",
      title:       "Example Video Title",
      description: "A short description of this video can go here."
    },
    {
      youtubeId:   "9bZkp7q19f0",
      title:       "Another Video",
      description: "Replace these with your actual YouTube video IDs."
    }
  ]

};
/* ── END OF CONFIG ─────────────────────────────────────── */


/* ══════════════════════════════════════════════════════════
   INTERNALS — do not edit below unless you're comfortable
   with JavaScript.
══════════════════════════════════════════════════════════ */

// ── Populate static text
document.getElementById('site-title').textContent    = CONFIG.title;
document.getElementById('site-subtitle').textContent = CONFIG.subtitle;
document.getElementById('footer-text').textContent   = CONFIG.footer;
document.getElementById('about-description').textContent = CONFIG.description;
document.title = CONFIG.title;

// ── Credits list
const creditsEl = document.getElementById('credits-list');
if (CONFIG.credits && CONFIG.credits.length) {
  CONFIG.credits.forEach(c => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="role">${escHtml(c.role)}</span><span class="name">${escHtml(c.name)}</span>`;
    creditsEl.appendChild(li);
  });
} else {
  creditsEl.closest('.about-section').style.display = 'none';
}

// ── Build gallery
const grid = document.getElementById('gallery-grid');
if (CONFIG.images && CONFIG.images.length) {
  CONFIG.images.forEach((img, i) => {
    const card = document.createElement('div');
    card.className = 'gallery-card';
    card.setAttribute('data-index', i);

    // Image (pointer-events: none via CSS)
    const imgEl = document.createElement('img');
    imgEl.src = img.url;
    imgEl.alt = img.caption || '';
    imgEl.loading = 'lazy';
    imgEl.ondragstart = () => false;

    // Transparent shield — catches the click, blocks right-click on the img
    const shield = document.createElement('div');
    shield.className = 'img-shield';
    shield.oncontextmenu = () => false;
    shield.addEventListener('click', () => openLightbox(i));

    card.appendChild(imgEl);
    card.appendChild(shield);

    if (img.caption || img.credit) {
      const cap = document.createElement('div');
      cap.className = 'caption';
      if (img.caption) {
        const t = document.createElement('div');
        t.className = 'cap-title';
        t.textContent = img.caption;
        cap.appendChild(t);
      }
      if (img.credit) {
        const cr = document.createElement('div');
        cr.className = 'cap-credit';
        cr.textContent = img.credit;
        cap.appendChild(cr);
      }
      card.appendChild(cap);
    }

    grid.appendChild(card);
  });
} else {
  grid.innerHTML = '<div class="empty-state">No images added yet. Edit the CONFIG.images array to add your photos.</div>';
}

// ── Build video grid
const vgrid = document.getElementById('video-grid');
if (CONFIG.videos && CONFIG.videos.length) {
  CONFIG.videos.forEach(v => {
    const card = document.createElement('div');
    card.className = 'video-card';

    const wrap = document.createElement('div');
    wrap.className = 'video-embed-wrap';
    const iframe = document.createElement('iframe');
    iframe.src = `https://www.youtube-nocookie.com/embed/${escHtml(v.youtubeId)}`;
    iframe.title = v.title || 'YouTube video';
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.allowFullscreen = true;
    wrap.appendChild(iframe);
    card.appendChild(wrap);

    if (v.title || v.description) {
      const meta = document.createElement('div');
      meta.className = 'video-meta';
      if (v.title) {
        const h = document.createElement('h3');
        h.textContent = v.title;
        meta.appendChild(h);
      }
      if (v.description) {
        const p = document.createElement('p');
        p.textContent = v.description;
        meta.appendChild(p);
      }
      card.appendChild(meta);
    }
    vgrid.appendChild(card);
  });
} else {
  vgrid.innerHTML = '<div class="empty-state">No videos added yet. Edit the CONFIG.videos array to add YouTube embeds.</div>';
}

// ── Tabs
const tabBtns  = document.querySelectorAll('nav.tabs button');
const tabPanels = document.querySelectorAll('.tab-panel');
tabBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.tab;
    tabBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
    tabPanels.forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    btn.setAttribute('aria-selected','true');
    const panel = document.getElementById('tab-' + target);
    // Trigger reflow so transition fires
    panel.classList.add('active');
  });
});

// ── Lightbox
let lbIndex = 0;
const lb       = document.getElementById('lightbox');
const lbImg    = document.getElementById('lightbox-img');
const lbCap    = document.getElementById('lb-caption');
const lbCred   = document.getElementById('lb-credit');
const lbCount  = document.getElementById('lightbox-counter');

function openLightbox(i) {
  lbIndex = i;
  showLb();
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function showLb() {
  const img = CONFIG.images[lbIndex];
  lbImg.src = img.url;
  lbImg.alt = img.caption || '';
  lbCap.textContent  = img.caption || '';
  lbCred.textContent = img.credit  || '';
  lbCount.textContent = `${lbIndex + 1} / ${CONFIG.images.length}`;
}

function closeLb() {
  lb.classList.remove('open');
  lbImg.src = '';
  document.body.style.overflow = '';
}

document.getElementById('lb-close').addEventListener('click', closeLb);
document.getElementById('lb-prev').addEventListener('click', (e) => {
  e.stopPropagation();
  lbIndex = (lbIndex - 1 + CONFIG.images.length) % CONFIG.images.length;
  showLb();
});
document.getElementById('lb-next').addEventListener('click', (e) => {
  e.stopPropagation();
  lbIndex = (lbIndex + 1) % CONFIG.images.length;
  showLb();
});

// Close on backdrop click (not on image or controls)
lb.addEventListener('click', (e) => {
  if (e.target === lb) closeLb();
});

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')      closeLb();
  if (e.key === 'ArrowLeft')  { lbIndex = (lbIndex - 1 + CONFIG.images.length) % CONFIG.images.length; showLb(); }
  if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % CONFIG.images.length; showLb(); }
});

// ── XSS-safe helper
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// ── Global drag/save prevention
document.addEventListener('dragstart', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
</script>
</body>
</html>
