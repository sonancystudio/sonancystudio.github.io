Reemerging interests in astrology, tarot, crystals etc. initiated a "Witchcraft Renaissance" and this modern-day witch aesthetic is where HeXXmaS drew much of its inspiration.

HeXXmaS represents the dark side of human personality known as the shadow.

This is the portion of the psyche we attempt to hide from the external world and deny to ourselves. It consists of all we perceive as evil, perverted, or corrupt. Desire, wrath, violence, lust, chaos, and megalomania are just some portions of shadow aspects portrayed in HeXXmaS.

The union between occultism and sexuality has existed for as long as magick has been practiced. Sexual energy is a strong manifesting force that is available to harness and utilize while engaging in forms of sex magick. The belief in demoniality reaches far back into antiquity. Nighttime sexual encounters with an Incubus/Succubus, the biblical account of Nephilim creation (hybrid offspring of fallen angels and human women), and the story of Lilith from Jewish folklore are embodiments of this concept. HeXXmaS captures the enchantment and allure frequently juxtaposed with ritual magick to leave viewers spellbound and bewitched.

This photo series captures a stunning visual representation of the marriage between beauty and the macabre. The magickal energies cultivated during HeXXmaS will leave a striking impression on anyone exposed to it.

const grid = document.getElementById('gallery-grid');

      if (img.credit)  { const cr = document.createElement('div'); cr.className = 'cap-credit'; cr.textContent = img.credit; cap.appendChild(cr); }

    iframe.src = `https://www.youtube-nocookie.com/embed/${esc(v.youtubeId)}`;

      const meta = document.createElement('div'); meta.className = 'video-meta';
      if (v.title) { const h = document.createElement('h3'); h.textContent = v.title; meta.appendChild(h); }
      if (v.description) { const p = document.createElement('p'); p.textContent = v.description; meta.appendChild(p); }
      card.appendChild(meta);
    }
    vgrid.appendChild(card);
  });
} else {
  vgrid.innerHTML = '<div class="empty-state">No videos yet — add YouTube IDs to CONFIG.videos above.</div>';
}

// ── Tabs
document.querySelectorAll('nav.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav.tabs button').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active'); btn.setAttribute('aria-selected','true');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ── Lightbox
let lbIndex = 0;
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
const lbCap = document.getElementById('lb-caption');
const lbCred = document.getElementById('lb-credit');
const lbCount = document.getElementById('lightbox-counter');

function openLightbox(i) { lbIndex = i; showLb(); lb.classList.add('open'); document.body.style.overflow = 'hidden'; }
function showLb() {
  const img = CONFIG.images[lbIndex];
  lbImg.src = img.url; lbImg.alt = img.caption || '';
  lbCap.textContent = img.caption || ''; lbCred.textContent = img.credit || '';
  lbCount.textContent = `${lbIndex + 1} / ${CONFIG.images.length}`;
}
function closeLb() { lb.classList.remove('open'); lbImg.src = ''; document.body.style.overflow = ''; }

document.getElementById('lb-close').addEventListener('click', closeLb);
document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); lbIndex = (lbIndex - 1 + CONFIG.images.length) % CONFIG.images.length; showLb(); });
document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); lbIndex = (lbIndex + 1) % CONFIG.images.length; showLb(); });
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft')  { lbIndex = (lbIndex - 1 + CONFIG.images.length) % CONFIG.images.length; showLb(); }
  if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % CONFIG.images.length; showLb(); }
});

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
document.addEventListener('dragstart', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
</script>
