  <style>
    :root {
      --bg:          #0d0d0d;
      --surface:     #161616;
      --card:        #1c1c1c;
      --border:      #2a2a2a;
      --text:        #e0e0e0;
      --text-muted:  #888;
      --accent:      #c9a96e;
      --radius:      6px;
      --gap:         14px;
      --font:        'Georgia', serif;
      --font-ui:     system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; -webkit-user-select: none; user-select: none; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; padding: 20px 24px; font-family: var(--font-ui); font-size: .75rem; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color .2s; }
    .back-link::before { content: '←'; }
    .back-link:hover { color: var(--accent); }

    header { text-align: center; padding: 32px 24px 0; }
    header h1 { font-size: clamp(2rem, 6vw, 3.4rem); letter-spacing: .12em; text-transform: uppercase; color: var(--accent); font-weight: normal; }
    header p.subtitle { margin-top: 8px; font-size: .9rem; color: var(--text-muted); font-family: var(--font-ui); letter-spacing: .06em; }

    nav.tabs { display: flex; justify-content: center; gap: 4px; margin-top: 36px; border-bottom: 1px solid var(--border); }
    nav.tabs button { background: none; border: none; border-bottom: 2px solid transparent; padding: 10px 28px; cursor: pointer; font-family: var(--font-ui); font-size: .82rem; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); transition: color .2s, border-color .2s; margin-bottom: -1px; }
    nav.tabs button:hover { color: var(--text); }
    nav.tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }

    main { max-width: 1400px; margin: 0 auto; padding: 40px 20px 80px; }

    .tab-panel { display: none; opacity: 0; transform: translateY(8px); transition: opacity .3s ease, transform .3s ease; }
    .tab-panel.active { display: block; opacity: 1; transform: translateY(0); }

    #gallery-grid { columns: 3 280px; column-gap: var(--gap); }
    .gallery-card { break-inside: avoid; position: relative; margin-bottom: var(--gap); border-radius: var(--radius); overflow: hidden; background: var(--card); border: 1px solid var(--border); cursor: pointer; transition: transform .2s ease, box-shadow .2s ease; }
    .gallery-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(201,169,110,.18); }
    .gallery-card img { display: block; width: 100%; height: auto; pointer-events: none; -webkit-user-drag: none; user-drag: none; -webkit-touch-callout: none; }
    .img-shield { position: absolute; inset: 0; z-index: 2; background: transparent; cursor: pointer; }
    .gallery-card .caption { padding: 10px 12px; font-family: var(--font-ui); font-size: .78rem; }
    .gallery-card .caption .cap-title { color: var(--text); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gallery-card .caption .cap-credit { color: var(--text-muted); font-size: .72rem; margin-top: 2px; }

    #lightbox { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.92); align-items: center; justify-content: center; flex-direction: column; }
    #lightbox.open { display: flex; }
    #lightbox-inner { position: relative; max-width: 90vw; max-height: 82vh; display: flex; align-items: center; justify-content: center; }
    #lightbox-img-wrap { position: relative; display: inline-block; }
    #lightbox-img { display: block; max-width: 90vw; max-height: 80vh; border-radius: var(--radius); pointer-events: none; -webkit-user-drag: none; user-drag: none; }
    #lightbox-img-shield { position: absolute; inset: 0; z-index: 2; }
    #lightbox-meta { text-align: center; margin-top: 14px; font-family: var(--font-ui); }
    #lightbox-meta .lb-title { font-size: 1rem; color: var(--text); }
    #lightbox-meta .lb-credit { font-size: .8rem; color: var(--text-muted); margin-top: 4px; }
    #lightbox-counter { font-size: .75rem; color: var(--text-muted); margin-top: 6px; font-family: var(--font-ui); letter-spacing: .06em; }
    #lb-close { position: fixed; top: 18px; right: 22px; background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 1.4rem; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color .2s, border-color .2s; z-index: 1010; }
    #lb-close:hover { color: var(--accent); border-color: var(--accent); }
    .lb-arrow { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,.5); border: 1px solid var(--border); color: var(--text-muted); font-size: 1.5rem; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color .2s, border-color .2s, background .2s; z-index: 1010; }
    .lb-arrow:hover { color: var(--accent); border-color: var(--accent); background: rgba(0,0,0,.8); }
    #lb-prev { left: 18px; } #lb-next { right: 18px; }

    #video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 28px; }
    .video-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .video-embed-wrap { position: relative; padding-top: 56.25%; background: #000; }
    .video-embed-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .video-meta { padding: 14px 16px; font-family: var(--font-ui); }
    .video-meta h3 { font-size: .9rem; font-weight: 600; color: var(--text); }
    .video-meta p { margin-top: 6px; font-size: .8rem; color: var(--text-muted); line-height: 1.5; }

    #about-inner {
      max-width: 720px;
      margin: 0 auto;
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
    }
    #about-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('https://badday.sonancy.studio/Mock-up.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: .18;
      pointer-events: none;
      z-index: 0;
    }
    #about-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.6);
      pointer-events: none;
      z-index: 1;
    }
    #about-inner .about-section { position: relative; z-index: 2; }
    .about-section { margin-bottom: 40px; }
    .about-section h2 { font-size: 1rem; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); font-family: var(--font-ui); font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .about-section p { line-height: 1.8; color: var(--text-muted); font-size: .95rem; }
    .credits-list { list-style: none; display: grid; gap: 10px; }
    .credits-list li { display: flex; gap: 16px; font-family: var(--font-ui); font-size: .88rem; }
    .credits-list .role { color: var(--accent); min-width: 140px; flex-shrink: 0; font-weight: 600; }
    .credits-list .name { color: var(--text-muted); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-family: var(--font-ui); font-size: .9rem; }
    footer { text-align: center; padding: 24px; font-family: var(--font-ui); font-size: .75rem; color: var(--text-muted); border-top: 1px solid var(--border); }

    @media (max-width: 600px) { #gallery-grid { columns: 1; } #lb-prev { left: 6px; } #lb-next { right: 6px; } nav.tabs button { padding: 10px 14px; font-size: .75rem; } }
    @media (min-width: 601px) and (max-width: 900px) { #gallery-grid { columns: 2; } }
  </style>

<script>
/* ══════════════════════════════════════════════════════
   CONFIGURATION — edit only this block
══════════════════════════════════════════════════════ */
const CONFIG = {
  subtitle: "Bad Day was shot July 10th 2021, & released September 14th 2021 in mini-gallery format",   // ← EDIT
  footer:   "© 2021 YeggeStryker All Rights Reserved. Unauthorized use is prohibited",  // ← EDIT

  // ── About tab ──────────────────────────────────────
  // EDIT: Replace this placeholder with your description
  description: `"Bad Day" was a spontaneous photoshoot with Ms. Stryker after she'd had a rough day. We went into it with no theme or plan, just to see what we could create. The location was my apartment, starting with the balcony. Unfortunately, the lighting out there was terrible—just one small light, enough to see in the dark but far from ideal for photos. At first, I thought it was a mistake, and if Ms. Stryker had asked to check the shots, she probably would've called it off.

Thankfully, the indoor lighting was much better. I used Nanoleaf Light Panels set to full brightness, and I highly recommend them. I'll definitely be getting more for future shoots. In the end, we captured some great photos—far more than I expected. Even the balcony shots were salvageable with some effort, thanks to artificial lighting and a mix of editing tools like Photoshop, Lightroom, Darkroom, Affinity Photo, and Pixelmator Photo for the iPad.

Brian Yegge`,

  // EDIT: Add/remove/change credit rows as needed
  credits: [
    { role: "Principal Photography", name: "Yegge Residence" },
    { role: "Photographer & Editor", name: "Brian Yegge" },
    { role: "Model",                 name: "MegAnne Stryker" },
    { role: "Photoshoot Date",       name: "July 10, 2021" },
    { role: "Release Date",          name: "September 14, 2021" },
    { role: "Production",            name: '"Bad Day" & "The DISASTERP1ECE" were billed out unofficially as YeggeStryker productions as they were attempts at revitalizing the efforts inspired by the creation of Sonancy.Studio' },
  ],

  // ── Gallery images ─────────────────────────────────
  // EDIT: Replace these with your actual image URLs.
  images: [
    { url: "https://badday.sonancy.studio/IMG_0161.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0162.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0163.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0164.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0165.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0166.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0168.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0169.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0170.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0171.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0172.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0175.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0176.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0177.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0178.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0179.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0180.png", caption: "", credit: "" },
    { url: "https://badday.sonancy.studio/IMG_0181.png", caption: "", credit: "" },
  ],

  // ── YouTube videos ─────────────────────────────────
  // EDIT: Paste the YouTube video ID (the part after v= in the URL)
  videos: [
    // { youtubeId: "XXXXXXXXXXX", title: "Video Title", description: "Optional description." },
  ]
};
/* ── END OF CONFIG ───────────────────────────────── */


document.getElementById('site-subtitle').textContent = CONFIG.subtitle;
document.getElementById('footer-text').textContent   = CONFIG.footer;
document.title = 'Bad Day';

(function() {
  const el = document.getElementById('about-description');
  el.innerHTML = '';
  CONFIG.description.split(/\n\n+/).forEach(para => {
    if (!para.trim()) return;
    const p = document.createElement('p');
    p.textContent = para.trim();
    p.style.marginBottom = '1.2em';
    el.appendChild(p);
  });
})();

const creditsEl = document.getElementById('credits-list');
if (CONFIG.credits && CONFIG.credits.length) {
  CONFIG.credits.forEach(c => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="role">${esc(c.role)}</span><span class="name">${esc(c.name)}</span>`;
    creditsEl.appendChild(li);
  });
}

const grid = document.getElementById('gallery-grid');
if (CONFIG.images && CONFIG.images.length) {
  CONFIG.images.forEach((img, i) => {
    const card = document.createElement('div'); card.className = 'gallery-card';
    const imgEl = document.createElement('img');
    imgEl.src = img.url; imgEl.alt = img.caption || ''; imgEl.loading = 'lazy';
    imgEl.ondragstart = () => false;
    const shield = document.createElement('div'); shield.className = 'img-shield';
    shield.oncontextmenu = () => false;
    shield.addEventListener('click', () => openLightbox(i));
    card.appendChild(imgEl); card.appendChild(shield);
    if (img.caption || img.credit) {
      const cap = document.createElement('div'); cap.className = 'caption';
      if (img.caption) { const t = document.createElement('div'); t.className = 'cap-title'; t.textContent = img.caption; cap.appendChild(t); }
      if (img.credit)  { const cr = document.createElement('div'); cr.className = 'cap-credit'; cr.textContent = img.credit; cap.appendChild(cr); }
      card.appendChild(cap);
    }
    grid.appendChild(card);
  });
} else {
  grid.innerHTML = '<div class="empty-state">No images yet — add URLs to CONFIG.images above.</div>';
}

const vgrid = document.getElementById('video-grid');
if (CONFIG.videos && CONFIG.videos.length) {
  CONFIG.videos.forEach(v => {
    const card = document.createElement('div'); card.className = 'video-card';
    const wrap = document.createElement('div'); wrap.className = 'video-embed-wrap';
    const iframe = document.createElement('iframe');
    iframe.src = `https://www.youtube-nocookie.com/embed/${esc(v.youtubeId)}`;
    iframe.title = v.title || 'YouTube video';
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.allowFullscreen = true;
    wrap.appendChild(iframe); card.appendChild(wrap);
    if (v.title || v.description) {
      const meta = document.createElement('div'); meta.className = 'video-meta';
      if (v.title) { const h = document.createElement('h3'); h.textContent = v.title; meta.appendChild(h); }
      if (v.description) { const p = document.createElement('p'); p.textContent = v.description; meta.appendChild(p); }
      card.appendChild(meta);
    }
    vgrid.appendChild(card);
  });
} else {
  vgrid.innerHTML = '<div class="empty-state">No videos yet — add YouTube IDs to CONFIG.videos above.</div>';
}

document.querySelectorAll('nav.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav.tabs button').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active'); btn.setAttribute('aria-selected','true');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

let lbIndex = 0;
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
const lbCap = document.getElementById('lb-caption');
const lbCred = document.getElementById('lb-credit');
const lbCount = document.getElementById('lightbox-counter');

function openLightbox(i) { lbIndex = i; showLb(); lb.classList.add('open'); document.body.style.overflow = 'hidden'; }
function showLb() {
  const img = CONFIG.images[lbIndex];
  lbImg.src = img.url; lbImg.alt = img.caption || '';
  lbCap.textContent = img.caption || ''; lbCred.textContent = img.credit || '';
  lbCount.textContent = `${lbIndex + 1} / ${CONFIG.images.length}`;
}
function closeLb() { lb.classList.remove('open'); lbImg.src = ''; document.body.style.overflow = ''; }

document.getElementById('lb-close').addEventListener('click', closeLb);
document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); lbIndex = (lbIndex - 1 + CONFIG.images.length) % CONFIG.images.length; showLb(); });
document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); lbIndex = (lbIndex + 1) % CONFIG.images.length; showLb(); });
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft')  { lbIndex = (lbIndex - 1 + CONFIG.images.length) % CONFIG.images.length; showLb(); }
  if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % CONFIG.images.length; showLb(); }
});

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
document.addEventListener('dragstart', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
</script>
